<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Samaritano · Orçamento de Exames</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    /* ═══════════════════════════════════════════════════════
       HOSPITAL SAMARITANO · Sistema Premium
       Tipografia editorial, micro-interações refinadas
       ═══════════════════════════════════════════════════════ */

    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── TEMA CLARO (padrão) ─── */
    :root {
      /* Cor institucional do Samaritano */
      --primary:        #C0392B;
      --primary-dark:   #962D22;
      --primary-light:  #E74C3C;
      --primary-soft:   #FDEDEC;
      --primary-glow:   rgba(192, 57, 43, 0.12);

      /* Neutros — paleta editorial fria */
      --bg:             #F7F7F8;
      --bg-elevated:    #FFFFFF;
      --bg-subtle:      #FAFAFB;
      --bg-subtle-2:    #F2F2F4;

      --text:           #1A1A1F;
      --text-secondary: #5A5A66;
      --text-muted:     #8B8B96;
      --text-disabled:  #C5C5CD;

      --border:         #E8E8EC;
      --border-strong:  #D4D4DA;

      /* Sucesso (valores monetários) */
      --success:        #16A34A;
      --success-soft:   #DCFCE7;

      /* Layout */
      --radius-sm:  6px;
      --radius:     8px;
      --radius-lg:  12px;
      --radius-xl:  16px;

      /* Sombras editoriais — bem sutis */
      --shadow-sm:  0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow:     0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md:  0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
      --shadow-lg:  0 12px 32px rgba(15, 23, 42, 0.08), 0 4px 8px rgba(15, 23, 42, 0.04);
      --shadow-glow: 0 0 0 4px var(--primary-glow);

      /* Tipografia */
      --font-display: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --font-body:    'DM Sans', system-ui, -apple-system, sans-serif;

      /* Acento escuro fixo (não muda no dark mode) */
      --ink:           #1A1A1F;
      --ink-on:        #FFFFFF;
    }

    /* ─── TEMA ESCURO ─── */
    [data-theme="dark"] {
      --bg:             #0E0E12;
      --bg-elevated:    #16161C;
      --bg-subtle:      #1A1A22;
      --bg-subtle-2:    #20202A;

      --text:           #F4F4F8;
      --text-secondary: #B8B8C8;
      --text-muted:     #7A7A88;
      --text-disabled:  #4A4A56;

      --border:         #2A2A36;
      --border-strong:  #3A3A48;

      --primary-soft:   rgba(192, 57, 43, 0.15);
      --primary-glow:   rgba(231, 76, 60, 0.18);

      --success:        #22C55E;
      --success-soft:   rgba(34, 197, 94, 0.15);

      --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow:     0 1px 3px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md:  0 4px 12px rgba(0, 0, 0, 0.4), 0 2px 4px rgba(0, 0, 0, 0.3);
      --shadow-lg:  0 12px 32px rgba(0, 0, 0, 0.5), 0 4px 8px rgba(0, 0, 0, 0.3);

      /* Acento no escuro: vira o vermelho do hospital */
      --ink:        var(--primary);
      --ink-on:     #FFFFFF;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv11', 'ss01';
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* Tipografia base */
    h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; }

    /* ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ */
    .header {
      background: var(--bg-elevated);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-logo {
      height: 48px;
      border-radius: var(--radius-sm);
    }

    .header-text { flex: 1; }

    .header h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.2;
    }

    .header p {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-top: 3px;
      font-weight: 500;
      text-transform: capitalize;
    }

    /* Botão de tema */
    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: var(--text-secondary);
      font-size: 16px;
    }
    .theme-toggle:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    /* ═══════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════ */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      padding: 22px 28px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════════════════
       CARDS
       ═══════════════════════════════════════════════════════ */
    .card {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }

    .card-header {
      padding: 14px 22px;
      font-weight: 600;
      font-size: 12.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--font-display);
    }

    .card-body { padding: 18px 22px; }

    .busca-header {
      background: var(--primary);
      color: white;
    }

    .orc-header {
      background: var(--ink);
      color: var(--ink-on);
    }

    .paciente-card { margin: 22px 28px 0; max-width: calc(1440px - 56px); margin-left: auto; margin-right: auto; overflow: visible; }
    .paciente-card .card-header {
      background: var(--bg-subtle-2);
      color: var(--text);
    }
    .paciente-card > div:last-child {
      overflow: visible;
    }

    .paciente-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 18px 22px;
    }

    /* ═══════════════════════════════════════════════════════
       FORMULÁRIOS
       ═══════════════════════════════════════════════════════ */
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      font-family: var(--font-display);
    }

    .field input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 14px;
      font-family: var(--font-body);
      font-weight: 500;
      color: var(--text);
      transition: all 0.18s ease;
      background: var(--bg-subtle);
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
      background: var(--bg-elevated);
    }

    .field input[readonly] {
      background: var(--bg-subtle-2);
      color: var(--text-secondary);
      cursor: default;
    }

    /* Date input customizado */
    .date-wrap { position: relative; }
    .date-wrap input {
      padding-right: 40px;
      cursor: text;
    }
    .date-wrap .date-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      transition: all 0.15s ease;
    }
    .date-wrap .date-icon:hover {
      background: var(--primary-soft);
      color: var(--primary);
    }

    /* Calendário popover */
    .calendar-popup {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 14px;
      width: 280px;
      z-index: 100;
      display: none;
      animation: cal-fade 0.18s ease;
    }
    .calendar-popup.show { display: block; }

    @keyframes cal-fade {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      text-transform: capitalize;
    }
    .cal-nav {
      width: 28px;
      height: 28px;
      border: none;
      background: var(--bg-subtle);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .cal-nav:hover { background: var(--primary-soft); color: var(--primary); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.12s ease;
      border: none;
      background: transparent;
      font-family: var(--font-body);
    }
    .cal-day:hover { background: var(--primary-soft); color: var(--primary); }
    .cal-day.muted { color: var(--text-disabled); }
    .cal-day.today {
      background: var(--bg-subtle-2);
      color: var(--primary);
      font-weight: 700;
    }
    .cal-day.selected {
      background: var(--primary);
      color: white;
      font-weight: 700;
    }
    .cal-day.selected:hover { background: var(--primary-dark); color: white; }

    .cal-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }
    .cal-shortcut {
      flex: 1;
      padding: 6px 10px;
      font-size: 11.5px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .cal-shortcut:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
    }

    /* ═══════════════════════════════════════════════════════
       BUSCA
       ═══════════════════════════════════════════════════════ */
    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14.5px;
      font-family: var(--font-body);
      font-weight: 500;
      color: var(--text);
      transition: all 0.18s ease;
      background: var(--bg-subtle);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
      background: var(--bg-elevated);
    }
    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      color: var(--text-muted);
    }

    .search-count {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 8px;
      min-height: 16px;
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════════════════
       TABELA DE RESULTADOS
       ═══════════════════════════════════════════════════════ */
    .results-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }

    .results-table thead tr { background: var(--bg-subtle-2); }
    .results-table thead th {
      padding: 10px 12px;
      text-align: left;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-family: var(--font-display);
      border-bottom: 1px solid var(--border);
    }
    .results-table thead th:last-child { text-align: center; width: 48px; }

    .results-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s ease;
    }
    .results-table tbody tr:hover { background: var(--primary-soft); }
    .results-table tbody tr:last-child { border-bottom: none; }

    .results-table td { padding: 9px 12px; vertical-align: middle; color: var(--text); }
    .results-table td.preco {
      color: var(--success);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
      font-feature-settings: 'tnum';
    }
    .results-table td.tuss {
      color: var(--text-muted);
      font-size: 11px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
    }

    .results-scroll { max-height: 440px; overflow-y: auto; }
    .results-scroll::-webkit-scrollbar { width: 6px; }
    .results-scroll::-webkit-scrollbar-track { background: transparent; }
    .results-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    .results-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ═══════════════════════════════════════════════════════
       BADGES
       ═══════════════════════════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-family: var(--font-display);
    }
    .badge-lab { background: var(--bg-subtle-2); color: var(--text-secondary); }
    .badge-img { background: var(--primary-soft); color: var(--primary); }

    mark {
      background: var(--primary-soft);
      color: var(--primary-dark);
      border-radius: 3px;
      padding: 1px 3px;
      font-weight: 700;
    }
    [data-theme="dark"] mark { color: var(--primary-light); }

    /* ═══════════════════════════════════════════════════════
       BOTÕES
       ═══════════════════════════════════════════════════════ */
    .btn-add {
      background: var(--success);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      width: 30px;
      height: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      box-shadow: var(--shadow-sm);
    }
    .btn-add:hover { background: #15803D; transform: translateY(-1px) scale(1.05); box-shadow: var(--shadow); }
    .btn-add:active { transform: scale(0.95); }

    .btn-del {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .btn-del:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-soft); }

    .btn-action {
      flex: 1;
      padding: 11px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 13.5px;
      font-weight: 600;
      font-family: var(--font-display);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }
    .btn-print { background: var(--primary); color: white; box-shadow: var(--shadow); }
    .btn-print:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-clear { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-clear:hover { background: var(--bg-subtle-2); border-color: var(--border-strong); color: var(--text); }

    .actions { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }

    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-disabled);
      font-size: 13px;
      font-style: italic;
    }

    /* ═══════════════════════════════════════════════════════
       TABELA DO ORÇAMENTO
       ═══════════════════════════════════════════════════════ */
    .orc-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }

    .orc-table thead tr { background: var(--bg-subtle-2); }
    .orc-table thead th {
      padding: 10px 12px;
      text-align: left;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-family: var(--font-display);
      border-bottom: 1px solid var(--border);
    }
    .orc-table thead th.num { width: 32px; text-align: center; }
    .orc-table thead th.qty { width: 64px; text-align: center; }
    .orc-table thead th.val { text-align: right; }
    .orc-table thead th.sub { text-align: right; }
    .orc-table thead th.del { width: 40px; }

    .orc-table tbody tr { border-bottom: 1px solid var(--border); }
    .orc-table tbody tr:last-child { border-bottom: none; }

    .orc-table td { padding: 10px 12px; vertical-align: middle; }
    .orc-table td.num { text-align: center; color: var(--text-disabled); font-size: 11px; font-feature-settings: 'tnum'; }
    .orc-table td.val { color: var(--success); font-weight: 600; text-align: right; white-space: nowrap; font-feature-settings: 'tnum'; }
    .orc-table td.sub { color: var(--success); font-weight: 700; text-align: right; white-space: nowrap; font-feature-settings: 'tnum'; }

    .orc-scroll { max-height: 400px; overflow-y: auto; }
    .orc-scroll::-webkit-scrollbar { width: 6px; }
    .orc-scroll::-webkit-scrollbar-track { background: transparent; }
    .orc-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .qty-input {
      width: 52px;
      text-align: center;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-body);
      background: var(--bg-subtle);
      color: var(--text);
      font-feature-settings: 'tnum';
    }
    .qty-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--bg-elevated);
      box-shadow: var(--shadow-glow);
    }

    /* ═══════════════════════════════════════════════════════
       TOTAIS
       ═══════════════════════════════════════════════════════ */
    .totals {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13.5px;
      color: var(--text-secondary);
      font-feature-settings: 'tnum';
    }
    .total-row span:last-child { font-weight: 600; color: var(--text); }
    .total-row.desconto { color: var(--primary); }
    .total-row.desconto span:last-child { color: var(--primary); }

    .total-row.final {
      margin-top: 12px;
      padding: 16px 18px;
      background: var(--ink);
      border-radius: var(--radius-lg);
      color: var(--ink-on);
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: -0.01em;
    }
    .total-row.final span:last-child { color: var(--ink-on); font-size: 18px; }

    .desconto-wrap { display: flex; align-items: center; gap: 8px; }

    .desconto-input {
      width: 72px;
      border: 1.5px solid var(--primary);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: 13px;
      color: var(--primary);
      font-weight: 700;
      font-family: var(--font-body);
      text-align: center;
      background: var(--primary-soft);
      font-feature-settings: 'tnum';
    }
    .desconto-input:focus { outline: none; box-shadow: var(--shadow-glow); }

    /* ═══════════════════════════════════════════════════════
       TOAST
       ═══════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--ink);
      color: var(--ink-on);
      padding: 12px 22px;
      border-radius: var(--radius);
      font-size: 13.5px;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 9999;
      font-family: var(--font-display);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ═══════════════════════════════════════════════════════
       PRINT — versão compacta e profissional
       ═══════════════════════════════════════════════════════ */
    @media print {
      @page { margin: 10mm; size: A4; }

      /* FORÇA TEMA CLARO NA IMPRESSÃO
         Independente do tema ativo na tela, o papel sempre sai branco */
      :root, [data-theme="dark"] {
        --bg:             #FFFFFF !important;
        --bg-elevated:    #FFFFFF !important;
        --bg-subtle:      #FAFAFB !important;
        --bg-subtle-2:    #F2F2F4 !important;
        --text:           #1A1A1F !important;
        --text-secondary: #5A5A66 !important;
        --text-muted:     #8B8B96 !important;
        --text-disabled:  #C5C5CD !important;
        --border:         #E8E8EC !important;
        --border-strong:  #D4D4DA !important;
        --success:        #16A34A !important;
        --primary-soft:   #FDEDEC !important;
        --ink:            #C0392B !important;
        --ink-on:         #FFFFFF !important;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body {
        background: white !important;
        color: #1A1A1F !important;
        font-size: 11px;
      }

      /* Esconde o que não deve sair na impressão */
      .card:first-of-type,    /* card de busca */
      .actions,
      .btn-del,
      .theme-toggle,
      .toast,
      .date-icon,
      .calendar-popup { display: none !important; }

      /* Layout: 1 coluna, sem padding lateral grande */
      .layout {
        grid-template-columns: 1fr !important;
        gap: 8px !important;
        padding: 0 !important;
        max-width: 100% !important;
      }

      /* Header: compacto, identidade visual mantida */
      .header {
        padding: 8px 0 10px !important;
        margin-bottom: 8px;
        border-bottom: 2px solid var(--primary) !important;
        box-shadow: none !important;
        position: static !important;
      }
      .header-logo { height: 38px !important; }
      .header h1   { font-size: 14px !important; }
      .header p    { font-size: 10px !important; margin-top: 1px !important; }

      /* Card do paciente: GRID 3 COLUNAS forçado, compacto */
      .paciente-card {
        margin: 0 0 8px !important;
        max-width: 100% !important;
        page-break-inside: avoid;
      }
      .paciente-card .card-header {
        padding: 4px 10px !important;
        font-size: 9px !important;
        background: #F2F2F4 !important;
      }
      .paciente-grid {
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 6px 10px !important;
        padding: 8px 10px !important;
      }
      .field label {
        font-size: 8px !important;
        margin-bottom: 1px !important;
      }
      .field input {
        padding: 3px 6px !important;
        font-size: 11px !important;
        border: none !important;
        border-bottom: 1px solid #BDC3C7 !important;
        border-radius: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
      }

      /* Esconde campos vazios para não desperdiçar espaço */
      .field input[value=""]:placeholder-shown ~ label,
      .field:has(input[value=""]:placeholder-shown) {
        /* Mantém visível mesmo vazio - atendente preenche à mão */
      }

      /* Card do orçamento: enxuto */
      .card { box-shadow: none !important; border: 1px solid #E0E0E0 !important; }
      .card-body { padding: 8px 10px !important; }
      .orc-header {
        padding: 5px 10px !important;
        font-size: 10px !important;
        background: var(--primary) !important;
        color: white !important;
      }

      /* Tabela do orçamento: linhas compactas */
      .orc-table { font-size: 10.5px !important; margin-top: 4px !important; }
      .orc-table thead th {
        padding: 4px 6px !important;
        font-size: 8.5px !important;
      }
      .orc-table td {
        padding: 4px 6px !important;
      }
      .orc-table td > div { font-size: 10.5px !important; }
      .orc-table td > div:last-child { font-size: 8px !important; margin-top: 0 !important; }

      .orc-scroll { max-height: none !important; overflow: visible !important; }

      /* Quantidade: número visível sem caixa */
      .qty-input {
        border: none !important;
        background: transparent !important;
        font-weight: 700 !important;
        width: 30px !important;
        font-size: 11px !important;
        padding: 0 !important;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .qty-input::-webkit-inner-spin-button,
      .qty-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* Totais compactos */
      .totals {
        margin-top: 8px !important;
        padding-top: 6px !important;
      }
      .total-row {
        padding: 2px 0 !important;
        font-size: 11px !important;
      }
      .total-row.desconto { display: none !important; }
      .total-row.final {
        margin-top: 6px !important;
        padding: 8px 12px !important;
        font-size: 12px !important;
        background: var(--primary) !important;
        color: white !important;
      }
      .total-row.final span:last-child { font-size: 14px !important; }

      /* Badges compactos */
      .badge {
        padding: 1px 5px !important;
        font-size: 7.5px !important;
      }

      /* Quebra de página inteligente */
      .paciente-card { page-break-after: avoid; }
      .orc-table tbody tr { page-break-inside: avoid; }
      .totals { page-break-inside: avoid; }
    }

    /* ═══════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; padding: 16px; }
      .paciente-grid { grid-template-columns: 1fr; }
      .header { padding: 14px 16px; }
      .paciente-card { margin: 16px; }
    }
  </style>
</head>

  <!-- ═══════════════════════════════════════════════════════
       LÓGICA DA APLICAÇÃO
       ═══════════════════════════════════════════════════════ -->
  <script>
    /* ── Utilitários ──────────────────────────────────────── */

    function fmt(valor) {
      return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function normalizar(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9 ]/g, ' ');
    }

    function destacar(nome, palavras) {
      let result = nome;
      palavras.forEach(p => {
        if (!p) return;
        const regex = new RegExp(`(${p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        result = result.replace(regex, '<mark>$1</mark>');
      });
      return result;
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    /* ── Inicialização ────────────────────────────────────── */

    /* Helpers de data dd/mm/aaaa */
    function toBR(date) {
      const d = String(date.getDate()).padStart(2, '0');
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const y = date.getFullYear();
      return `${d}/${m}/${y}`;
    }
    function fromBR(str) {
      const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (!m) return null;
      const date = new Date(+m[3], +m[2] - 1, +m[1]);
      if (date.getDate() != +m[1] || date.getMonth() != +m[2] - 1) return null;
      return date;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const hoje = new Date();
      document.getElementById('pac-data').value = toBR(hoje);
      document.getElementById('data-header').textContent =
        hoje.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('total-exames').textContent = `${EXAMES.length} exames`;
      document.getElementById('search-count').textContent = `Digite para buscar entre os ${EXAMES.length} exames`;

      initTheme();
      initCalendar();
      initDateMask();
    });

    /* ── Tema claro/escuro ────────────────────────────────── */
    function initTheme() {
      const btn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      // Detecta preferência do sistema
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      // Lê se já tem tema salvo na sessão
      let tema = sessionStorage.getItem('tema-samaritano');
      if (!tema) tema = prefersDark ? 'dark' : 'light';
      aplicarTema(tema);

      btn.addEventListener('click', () => {
        const atual = document.documentElement.getAttribute('data-theme') || 'light';
        const novo = atual === 'dark' ? 'light' : 'dark';
        aplicarTema(novo);
        try { sessionStorage.setItem('tema-samaritano', novo); } catch(e) {}
      });

      function aplicarTema(t) {
        if (t === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          icon.textContent = '☀️';
        } else {
          document.documentElement.removeAttribute('data-theme');
          icon.textContent = '🌙';
        }
      }
    }

    /* ── Máscara dd/mm/aaaa no input ──────────────────────── */
    function initDateMask() {
      const input = document.getElementById('pac-data');
      input.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);
        if (v.length > 4) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
        else if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
        e.target.value = v;
      });
      input.addEventListener('blur', e => {
        const d = fromBR(e.target.value);
        if (e.target.value && !d) {
          // Inválida — restaura a data de hoje silenciosamente
          input.value = toBR(new Date());
          toast('Data inválida — restaurado para hoje');
        }
      });
    }

    /* ── Calendário customizado ──────────────────────────── */
    function initCalendar() {
      const popup = document.getElementById('cal-popup');
      const icon = document.getElementById('date-icon');
      const input = document.getElementById('pac-data');
      const grid = document.getElementById('cal-grid');
      const title = document.getElementById('cal-title');
      let viewDate = new Date();

      function abrir() {
        const dataAtual = fromBR(input.value);
        if (dataAtual) viewDate = new Date(dataAtual);
        renderizar();
        popup.classList.add('show');
      }
      function fechar() { popup.classList.remove('show'); }

      icon.addEventListener('click', e => {
        e.stopPropagation();
        popup.classList.contains('show') ? fechar() : abrir();
      });

      document.addEventListener('click', e => {
        if (!popup.contains(e.target) && e.target !== icon) fechar();
      });

      document.getElementById('cal-prev').addEventListener('click', e => {
        e.stopPropagation();
        viewDate.setMonth(viewDate.getMonth() - 1);
        renderizar();
      });
      document.getElementById('cal-next').addEventListener('click', e => {
        e.stopPropagation();
        viewDate.setMonth(viewDate.getMonth() + 1);
        renderizar();
      });
      document.getElementById('cal-today').addEventListener('click', e => {
        e.stopPropagation();
        const h = new Date();
        input.value = toBR(h);
        viewDate = new Date(h);
        renderizar();
        fechar();
      });
      document.getElementById('cal-clear').addEventListener('click', e => {
        e.stopPropagation();
        input.value = '';
        fechar();
      });

      function renderizar() {
        const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
        const dows = ['D','S','T','Q','Q','S','S'];
        title.textContent = `${meses[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

        grid.innerHTML = '';
        // Cabeçalho dias da semana
        dows.forEach(d => {
          const el = document.createElement('div');
          el.className = 'cal-dow';
          el.textContent = d;
          grid.appendChild(el);
        });

        const ano = viewDate.getFullYear();
        const mes = viewDate.getMonth();
        const primeiroDia = new Date(ano, mes, 1).getDay(); // 0=Dom
        const diasNoMes = new Date(ano, mes + 1, 0).getDate();
        const diasMesAnterior = new Date(ano, mes, 0).getDate();

        const hoje = new Date();
        const hojeStr = toBR(hoje);
        const selecionada = input.value;

        // Dias do mês anterior (cinza)
        for (let i = primeiroDia - 1; i >= 0; i--) {
          const dia = diasMesAnterior - i;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'cal-day muted';
          btn.textContent = dia;
          const d = new Date(ano, mes - 1, dia);
          btn.addEventListener('click', e => { e.stopPropagation(); selecionar(d); });
          grid.appendChild(btn);
        }

        // Dias do mês atual
        for (let dia = 1; dia <= diasNoMes; dia++) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'cal-day';
          btn.textContent = dia;
          const d = new Date(ano, mes, dia);
          const dStr = toBR(d);
          if (dStr === hojeStr) btn.classList.add('today');
          if (dStr === selecionada) btn.classList.add('selected');
          btn.addEventListener('click', e => { e.stopPropagation(); selecionar(d); });
          grid.appendChild(btn);
        }

        // Completa com dias do próximo mês
        const totalCelulas = 7 + primeiroDia + diasNoMes;
        const restantes = (7 - (totalCelulas % 7)) % 7;
        for (let dia = 1; dia <= restantes; dia++) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'cal-day muted';
          btn.textContent = dia;
          const d = new Date(ano, mes + 1, dia);
          btn.addEventListener('click', e => { e.stopPropagation(); selecionar(d); });
          grid.appendChild(btn);
        }
      }

      function selecionar(date) {
        input.value = toBR(date);
        viewDate = new Date(date);
        renderizar();
        fechar();
      }
    }

    /* ── Busca ─────────────────────────────────────────────── */

    /* Sinônimos: expandem o que a pessoa busca para incluir variações */
    const SINONIMOS = {
      'tomografia': ['tc'],
      'tc':         ['tomografia'],
      'ultrassom':  ['us'],
      'us':         ['ultrassom'],
      'raiox':      ['raio x', 'rx'],
      'raio':       ['rx'],
      'rx':         ['raio'],
      'eco':        ['ecocardiograma', 'ecocardio'],
      'papanicolau':['papa nicolau'],
    };

    let searchTimeout;

    document.getElementById('search').addEventListener('input', function () {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => buscar(this.value.trim()), 120);
    });

    function buscar(termo) {
      const body  = document.getElementById('results-body');
      const count = document.getElementById('search-count');

      if (!termo) {
        body.innerHTML  = '<tr><td colspan="5" class="empty-msg">Aguardando pesquisa...</td></tr>';
        count.textContent = `Digite para buscar entre os ${EXAMES.length} exames`;
        return;
      }

      const termoN   = normalizar(termo);
      const palavras = termoN.split(/\s+/).filter(Boolean);

      /* Expande cada palavra com seus sinônimos */
      const palavrasExp = palavras.flatMap(p => [p, ...(SINONIMOS[p] || [])]);

      const resultados = EXAMES
        .map(e => {
          const nomeN    = normalizar(e.nome);
          const starts   = nomeN.startsWith(termoN) ? 3 : 0;
          /* Considera match se TODA palavra (ou um sinônimo dela) aparece */
          const allWords = palavras.every(p =>
            [p, ...(SINONIMOS[p] || [])].some(v => nomeN.includes(v))
          ) ? 2 : 0;
          const anyWord  = palavrasExp.some(p => nomeN.includes(p))  ? 1 : 0;
          return { ...e, score: starts + allWords + anyWord };
        })
        .filter(e => e.score > 0)
        .sort((a, b) => b.score - a.score || a.nome.localeCompare(b.nome));

      count.textContent = resultados.length === 0
        ? `Nenhum resultado para "${termo}"`
        : `${resultados.length} resultado(s) para "${termo}"`;

      if (resultados.length === 0) {
        body.innerHTML = `<tr><td colspan="5" class="empty-msg">Nenhum exame encontrado para "<b>${termo}</b>"</td></tr>`;
        return;
      }

      body.innerHTML = resultados.map(e => {
        const nomeHL = destacar(e.nome, palavras);
        const badge  = e.tipo === 'Sangue/Lab'
          ? '<span class="badge badge-lab">Lab</span>'
          : '<span class="badge badge-img">Imagem</span>';
        const idx = EXAMES.findIndex(x => x.nome === e.nome && x.tuss === e.tuss);

        return `
          <tr>
            <td>${nomeHL}</td>
            <td class="tipo">${badge}</td>
            <td class="tuss">${e.tuss}</td>
            <td class="preco">${fmt(e.preco)}</td>
            <td><button class="btn-add" onclick="adicionarExame(${idx})" title="Adicionar">+</button></td>
          </tr>`;
      }).join('');
    }

    /* ── Orçamento ─────────────────────────────────────────── */

    let itens   = [];
    let counter = 0;

    function adicionarExame(idx) {
      const e = EXAMES[idx];
      if (!e) return;

      counter++;
      itens.push({ id: counter, nome: e.nome, tipo: e.tipo, tuss: e.tuss, preco: e.preco, qtde: 1 });
      renderOrcamento();

      const label = e.nome.length > 35 ? e.nome.slice(0, 35) + '…' : e.nome;
      toast(`"${label}" adicionado`);
    }

    function renderOrcamento() {
      const body = document.getElementById('orc-body');

      if (itens.length === 0) {
        body.innerHTML = '<tr id="orc-empty"><td colspan="6" class="empty-msg">Adicione exames pela busca ao lado</td></tr>';
        atualizarTotais();
        return;
      }

      body.innerHTML = itens.map((item, i) => {
        const sub   = item.preco * item.qtde;
        const badge = item.tipo === 'Sangue/Lab'
          ? '<span class="badge badge-lab">Lab</span>'
          : '<span class="badge badge-img">Img</span>';

        return `
          <tr>
            <td class="num">${i + 1}</td>
            <td>
              <div style="font-size:13px;font-weight:600">${item.nome}</div>
              <div style="display:flex;gap:6px;margin-top:2px;align-items:center">
                ${badge}
                <span style="font-size:10px;color:var(--cinza-500);font-family:monospace">TUSS ${item.tuss}</span>
              </div>
            </td>
            <td class="qty" style="text-align:center">
              <input class="qty-input" type="number" min="1" value="${item.qtde}"
                     onchange="atualizarQtde(${item.id}, this.value)">
            </td>
            <td class="val">${fmt(item.preco)}</td>
            <td class="sub">${fmt(sub)}</td>
            <td><button class="btn-del" onclick="removerItem(${item.id})" title="Remover">✕</button></td>
          </tr>`;
      }).join('');

      atualizarTotais();
    }

    function atualizarQtde(id, val) {
      const item = itens.find(x => x.id === id);
      if (item) {
        item.qtde = Math.max(1, parseInt(val) || 1);
        renderOrcamento();
      }
    }

    function removerItem(id) {
      itens = itens.filter(x => x.id !== id);
      renderOrcamento();
    }

    function limparOrcamento() {
      if (itens.length === 0) return;
      if (confirm('Deseja limpar todos os exames do orçamento?')) {
        itens = [];
        renderOrcamento();
      }
    }

    /* ── Totais & Desconto ─────────────────────────────────── */

    function atualizarTotais() {
      const sub     = itens.reduce((s, i) => s + i.preco * i.qtde, 0);
      const desc    = parseFloat(document.getElementById('desconto').value) || 0;
      const valDesc = sub * (desc / 100);
      const total   = sub - valDesc;

      document.getElementById('subtotal').textContent     = fmt(sub);
      document.getElementById('val-desconto').textContent  = `– ${fmt(valDesc)}`;
      document.getElementById('total-final').textContent   = fmt(total);
    }

    document.getElementById('desconto').addEventListener('input', atualizarTotais);
  </script>

</body>
</html>
