<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Samaritano · Orçamento de Exames</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    /* ═══════════════════════════════════════════════════════
       RESET & VARIÁVEIS — Paleta Hospital Samaritano
       ═══════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Cores extraídas da logo */
      --vermelho:        #C0392B;
      --vermelho-escuro: #962D22;
      --vermelho-claro:  #E74C3C;
      --vermelho-bg:     #FDEDEC;

      /* Neutros */
      --cinza-900: #2C2C2C;
      --cinza-700: #4A4A4A;
      --cinza-500: #7F8C8D;
      --cinza-300: #BDC3C7;
      --cinza-100: #ECF0F1;
      --cinza-50:  #F8F9FA;
      --branco:    #FFFFFF;

      /* Acentos funcionais */
      --verde:       #27AE60;
      --verde-valor: #1E8449;

      /* Layout */
      --radius:    6px;
      --radius-lg: 10px;
      --sombra:    0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --sombra-md: 0 4px 12px rgba(0, 0, 0, 0.08);

      /* Tipografia */
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--cinza-50);
      color: var(--cinza-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ */
    .header {
      background: var(--branco);
      color: var(--cinza-900);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid var(--vermelho);
      box-shadow: var(--sombra);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--cinza-900);
    }

    .header p {
      font-size: 12px;
      color: var(--cinza-500);
      margin-top: 2px;
    }

    .header-logo {
      height: 46px;
      border-radius: var(--radius);
    }

    /* ═══════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════ */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════════════════
       CARDS
       ═══════════════════════════════════════════════════════ */
    .card {
      background: var(--branco);
      border-radius: var(--radius-lg);
      box-shadow: var(--sombra);
      overflow: hidden;
      border: 1px solid var(--cinza-100);
    }

    .card-header {
      padding: 12px 20px;
      font-weight: 600;
      font-size: 13px;
      color: var(--branco);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .card-body { padding: 16px 20px; }

    .busca-header {
      background: var(--vermelho);
    }

    .orc-header {
      background: var(--cinza-900);
    }

    /* ═══════════════════════════════════════════════════════
       DADOS DO PACIENTE
       ═══════════════════════════════════════════════════════ */
    .paciente-card { margin: 16px 24px 0; }

    .paciente-card .card-header {
      background: var(--cinza-700);
    }

    .paciente-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px 20px;
    }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--cinza-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--cinza-300);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 13px;
      font-family: var(--font);
      transition: border 0.2s, box-shadow 0.2s;
      background: var(--cinza-50);
    }

    .field input:focus {
      outline: none;
      border-color: var(--vermelho);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
      background: var(--branco);
    }

    /* ═══════════════════════════════════════════════════════
       BUSCA
       ═══════════════════════════════════════════════════════ */
    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1.5px solid var(--cinza-300);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font);
      transition: border 0.2s, box-shadow 0.2s;
      background: var(--cinza-50);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--vermelho);
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
      background: var(--branco);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      color: var(--cinza-500);
    }

    .search-count {
      font-size: 11px;
      color: var(--vermelho);
      margin-top: 6px;
      min-height: 16px;
    }

    /* ═══════════════════════════════════════════════════════
       TABELA DE RESULTADOS
       ═══════════════════════════════════════════════════════ */
    .results-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }

    .results-table thead tr { background: var(--vermelho); color: var(--branco); }
    .results-table thead th {
      padding: 8px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .results-table thead th:last-child { text-align: center; width: 48px; }

    .results-table tbody tr {
      border-bottom: 1px solid var(--cinza-100);
      transition: background 0.15s;
    }
    .results-table tbody tr:hover                   { background: var(--vermelho-bg); }
    .results-table tbody tr:nth-child(even)          { background: var(--cinza-50); }
    .results-table tbody tr:nth-child(even):hover    { background: var(--vermelho-bg); }

    .results-table td       { padding: 7px 10px; vertical-align: middle; }
    .results-table td.preco { color: var(--verde-valor); font-weight: 600; text-align: right; white-space: nowrap; }
    .results-table td.tuss  { color: var(--cinza-500); font-size: 11px; font-family: 'SF Mono', 'Consolas', monospace; }

    .results-scroll { max-height: 420px; overflow-y: auto; }
    .results-scroll::-webkit-scrollbar       { width: 4px; }
    .results-scroll::-webkit-scrollbar-track  { background: transparent; }
    .results-scroll::-webkit-scrollbar-thumb  { background: var(--cinza-300); border-radius: 4px; }
    .results-scroll::-webkit-scrollbar-thumb:hover { background: var(--vermelho); }

    /* ═══════════════════════════════════════════════════════
       BADGES
       ═══════════════════════════════════════════════════════ */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .badge-lab { background: var(--cinza-100); color: var(--cinza-700); }
    .badge-img { background: var(--vermelho-bg); color: var(--vermelho); }

    mark {
      background: rgba(192, 57, 43, 0.15);
      color: var(--vermelho-escuro);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ═══════════════════════════════════════════════════════
       BOTÕES
       ═══════════════════════════════════════════════════════ */
    .btn-add {
      background: var(--verde);
      color: var(--branco);
      border: none;
      border-radius: var(--radius);
      width: 30px;
      height: 28px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .btn-add:hover  { background: #219a52; transform: scale(1.08); }
    .btn-add:active { transform: scale(0.95); }

    .btn-del {
      background: none;
      color: var(--cinza-500);
      border: 1px solid var(--cinza-300);
      border-radius: var(--radius);
      padding: 3px 7px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .btn-del:hover { color: var(--vermelho); border-color: var(--vermelho); background: var(--vermelho-bg); }

    .btn-action {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-print       { background: var(--vermelho); color: var(--branco); }
    .btn-print:hover  { background: var(--vermelho-escuro); }
    .btn-clear       { background: var(--branco); color: var(--cinza-700); border: 1px solid var(--cinza-300); }
    .btn-clear:hover  { background: var(--cinza-100); border-color: var(--cinza-500); }

    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

    .empty-msg { text-align: center; padding: 30px; color: var(--cinza-300); font-size: 13px; }

    /* ═══════════════════════════════════════════════════════
       TABELA DO ORÇAMENTO
       ═══════════════════════════════════════════════════════ */
    .orc-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }

    .orc-table thead tr  { background: var(--cinza-900); color: var(--branco); }
    .orc-table thead th  {
      padding: 8px 10px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .orc-table thead th.num { width: 32px; text-align: center; }
    .orc-table thead th.qty { width: 58px; text-align: center; }
    .orc-table thead th.val { text-align: right; }
    .orc-table thead th.sub { text-align: right; }
    .orc-table thead th.del { width: 36px; }

    .orc-table tbody tr               { border-bottom: 1px solid var(--cinza-100); }
    .orc-table tbody tr:nth-child(even) { background: var(--cinza-50); }

    .orc-table td      { padding: 7px 10px; vertical-align: middle; }
    .orc-table td.num  { text-align: center; color: var(--cinza-300); font-size: 11px; }
    .orc-table td.val  { color: var(--verde-valor); font-weight: 600; text-align: right; white-space: nowrap; }
    .orc-table td.sub  { color: var(--verde-valor); font-weight: 700; text-align: right; white-space: nowrap; }
    .orc-table td.tipo { font-size: 11px; }

    .orc-scroll { max-height: 380px; overflow-y: auto; }
    .orc-scroll::-webkit-scrollbar       { width: 4px; }
    .orc-scroll::-webkit-scrollbar-track  { background: transparent; }
    .orc-scroll::-webkit-scrollbar-thumb  { background: var(--cinza-300); border-radius: 4px; }

    .qty-input {
      width: 48px;
      text-align: center;
      border: 1px solid var(--cinza-300);
      border-radius: var(--radius);
      padding: 4px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      background: var(--cinza-50);
    }
    .qty-input:focus {
      outline: none;
      border-color: var(--vermelho);
      background: var(--branco);
    }

    /* ═══════════════════════════════════════════════════════
       TOTAIS
       ═══════════════════════════════════════════════════════ */
    .totals {
      margin-top: 16px;
      border-top: 1px solid var(--cinza-100);
      padding-top: 14px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 13px;
    }
    .total-row.desconto { color: var(--vermelho); }
    .total-row.final {
      margin-top: 10px;
      padding: 14px 16px;
      background: var(--vermelho);
      border-radius: var(--radius);
      color: var(--branco);
      font-size: 16px;
      font-weight: 700;
    }

    .desconto-wrap { display: flex; align-items: center; gap: 8px; }

    .desconto-input {
      width: 64px;
      border: 1px solid var(--vermelho);
      border-radius: var(--radius);
      padding: 4px 8px;
      font-size: 13px;
      color: var(--vermelho);
      font-weight: 600;
      font-family: var(--font);
      text-align: center;
      background: var(--vermelho-bg);
    }
    .desconto-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1); }

    /* ═══════════════════════════════════════════════════════
       TOAST
       ═══════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--cinza-900);
      color: var(--branco);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--sombra-md);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ═══════════════════════════════════════════════════════
       PRINT — AJUSTES PARA IMPRESSÃO
       ═══════════════════════════════════════════════════════ */
    @media print {
      body { background: white; }
      .layout { grid-template-columns: 1fr; }

      /* Esconde card de busca, ações, botões de remover */
      .card:first-of-type { display: none; }
      .actions, .btn-del { display: none; }

      /* AJUSTE 1: esconder rodapé do navegador (URL/site) — dica de impressão */
      @page { margin: 12mm; }

      /* AJUSTE 2: mostrar quantidade na impressão (sem o input editável) */
      .qty-input {
        border: none !important;
        background: transparent !important;
        font-weight: 700;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .qty-input::-webkit-inner-spin-button,
      .qty-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* AJUSTE 3: esconder linha de desconto na impressão (mantém Subtotal e Total) */
      .total-row.desconto { display: none !important; }

      /* Cores corretas na impressão */
      .header           { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .total-row.final  { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .badge            { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>

  <!-- ═══════════════════════════════════════════════════════
       LÓGICA DA APLICAÇÃO
       ═══════════════════════════════════════════════════════ -->
  <script>
    /* ── Utilitários ──────────────────────────────────────── */

    function fmt(valor) {
      return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function normalizar(str) {
      return str.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9 ]/g, ' ');
    }

    function destacar(nome, palavras) {
      let result = nome;
      palavras.forEach(p => {
        if (!p) return;
        const regex = new RegExp(`(${p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        result = result.replace(regex, '<mark>$1</mark>');
      });
      return result;
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    /* ── Inicialização ────────────────────────────────────── */

    document.addEventListener('DOMContentLoaded', () => {
      const hoje = new Date().toISOString().split('T')[0];
      document.getElementById('pac-data').value = hoje;
      document.getElementById('data-header').textContent =
        new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('total-exames').textContent = `${EXAMES.length} exames`;
      document.getElementById('search-count').textContent = `Digite para buscar entre os ${EXAMES.length} exames`;
    });

    /* ── Busca ─────────────────────────────────────────────── */

    /* Sinônimos: expandem o que a pessoa busca para incluir variações */
    const SINONIMOS = {
      'tomografia': ['tc'],
      'tc':         ['tomografia'],
      'ultrassom':  ['us'],
      'us':         ['ultrassom'],
      'raiox':      ['raio x', 'rx'],
      'raio':       ['rx'],
      'rx':         ['raio'],
      'eco':        ['ecocardiograma', 'ecocardio'],
      'papanicolau':['papa nicolau'],
    };

    let searchTimeout;

    document.getElementById('search').addEventListener('input', function () {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => buscar(this.value.trim()), 120);
    });

    function buscar(termo) {
      const body  = document.getElementById('results-body');
      const count = document.getElementById('search-count');

      if (!termo) {
        body.innerHTML  = '<tr><td colspan="5" class="empty-msg">Aguardando pesquisa...</td></tr>';
        count.textContent = `Digite para buscar entre os ${EXAMES.length} exames`;
        return;
      }

      const termoN   = normalizar(termo);
      const palavras = termoN.split(/\s+/).filter(Boolean);

      /* Expande cada palavra com seus sinônimos */
      const palavrasExp = palavras.flatMap(p => [p, ...(SINONIMOS[p] || [])]);

      const resultados = EXAMES
        .map(e => {
          const nomeN    = normalizar(e.nome);
          const starts   = nomeN.startsWith(termoN) ? 3 : 0;
          /* Considera match se TODA palavra (ou um sinônimo dela) aparece */
          const allWords = palavras.every(p =>
            [p, ...(SINONIMOS[p] || [])].some(v => nomeN.includes(v))
          ) ? 2 : 0;
          const anyWord  = palavrasExp.some(p => nomeN.includes(p))  ? 1 : 0;
          return { ...e, score: starts + allWords + anyWord };
        })
        .filter(e => e.score > 0)
        .sort((a, b) => b.score - a.score || a.nome.localeCompare(b.nome));

      count.textContent = resultados.length === 0
        ? `Nenhum resultado para "${termo}"`
        : `${resultados.length} resultado(s) para "${termo}"`;

      if (resultados.length === 0) {
        body.innerHTML = `<tr><td colspan="5" class="empty-msg">Nenhum exame encontrado para "<b>${termo}</b>"</td></tr>`;
        return;
      }

      body.innerHTML = resultados.map(e => {
        const nomeHL = destacar(e.nome, palavras);
        const badge  = e.tipo === 'Laboratorial'
          ? '<span class="badge badge-lab">Lab</span>'
          : '<span class="badge badge-img">Imagem</span>';
        const idx = EXAMES.findIndex(x => x.nome === e.nome && x.tuss === e.tuss);

        return `
          <tr>
            <td>${nomeHL}</td>
            <td class="tipo">${badge}</td>
            <td class="tuss">${e.tuss}</td>
            <td class="preco">${fmt(e.preco)}</td>
            <td><button class="btn-add" onclick="adicionarExame(${idx})" title="Adicionar">+</button></td>
          </tr>`;
      }).join('');
    }

    /* ── Orçamento ─────────────────────────────────────────── */

    let itens   = [];
    let counter = 0;

    function adicionarExame(idx) {
      const e = EXAMES[idx];
      if (!e) return;

      counter++;
      itens.push({ id: counter, nome: e.nome, tipo: e.tipo, tuss: e.tuss, preco: e.preco, qtde: 1 });
      renderOrcamento();

      const label = e.nome.length > 35 ? e.nome.slice(0, 35) + '…' : e.nome;
      toast(`"${label}" adicionado`);
    }

    function renderOrcamento() {
      const body = document.getElementById('orc-body');

      if (itens.length === 0) {
        body.innerHTML = '<tr id="orc-empty"><td colspan="6" class="empty-msg">Adicione exames pela busca ao lado</td></tr>';
        atualizarTotais();
        return;
      }

      body.innerHTML = itens.map((item, i) => {
        const sub   = item.preco * item.qtde;
        const badge = item.tipo === 'Laboratorial'
          ? '<span class="badge badge-lab">Lab</span>'
          : '<span class="badge badge-img">Img</span>';

        return `
          <tr>
            <td class="num">${i + 1}</td>
            <td>
              <div style="font-size:13px;font-weight:600">${item.nome}</div>
              <div style="display:flex;gap:6px;margin-top:2px;align-items:center">
                ${badge}
                <span style="font-size:10px;color:var(--cinza-500);font-family:monospace">TUSS ${item.tuss}</span>
              </div>
            </td>
            <td class="qty" style="text-align:center">
              <input class="qty-input" type="number" min="1" value="${item.qtde}"
                     onchange="atualizarQtde(${item.id}, this.value)">
            </td>
            <td class="val">${fmt(item.preco)}</td>
            <td class="sub">${fmt(sub)}</td>
            <td><button class="btn-del" onclick="removerItem(${item.id})" title="Remover">✕</button></td>
          </tr>`;
      }).join('');

      atualizarTotais();
    }

    function atualizarQtde(id, val) {
      const item = itens.find(x => x.id === id);
      if (item) {
        item.qtde = Math.max(1, parseInt(val) || 1);
        renderOrcamento();
      }
    }

    function removerItem(id) {
      itens = itens.filter(x => x.id !== id);
      renderOrcamento();
    }

    function limparOrcamento() {
      if (itens.length === 0) return;
      if (confirm('Deseja limpar todos os exames do orçamento?')) {
        itens = [];
        renderOrcamento();
      }
    }

    /* ── Totais & Desconto ─────────────────────────────────── */

    function atualizarTotais() {
      const sub     = itens.reduce((s, i) => s + i.preco * i.qtde, 0);
      const desc    = parseFloat(document.getElementById('desconto').value) || 0;
      const valDesc = sub * (desc / 100);
      const total   = sub - valDesc;

      document.getElementById('subtotal').textContent     = fmt(sub);
      document.getElementById('val-desconto').textContent  = `– ${fmt(valDesc)}`;
      document.getElementById('total-final').textContent   = fmt(total);
    }

    document.getElementById('desconto').addEventListener('input', atualizarTotais);
  </script>
